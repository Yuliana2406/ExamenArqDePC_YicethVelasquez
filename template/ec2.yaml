AWSTemplateFormatVersion: '2010-09-09'

Resources:

  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir HTTP
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c02fb55956c7d316
      # ✅ Corregido: SecurityGroupIds funciona en cualquier VPC
      SecurityGroupIds:
        - !Ref WebSecurityGroup

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install httpd -y
          systemctl start httpd
          systemctl enable httpd

          cat <<EOF > /var/www/html/index.html
          <!DOCTYPE html>
          <html>
          <head>
          <title>Examen Final</title>
          <style>
          body{
            background:#f5f5f5;
            text-align:center;
            font-family:Arial;
          }
          h1{
            color:#0077cc;
          }
          </style>
          </head>
          <body>

          <h1>Yiceth Yuliana Velasquez Gomez</h1>
          <h2>0192312</h2>

          <p>Examen Final Arquitectura de Computadores</p>

          <button onclick="mensaje()">Click</button>

          <script>
          function mensaje(){
            alert("Hola Profesor Wilder");
          }
          </script>

          </body>
          </html>
          EOF


Outputs:
  WebServerIP:
    Description: IP publica del servidor web
    Value: !GetAtt WebServer.PublicIp

  WebServerURL:
    Description: URL del servidor web
    Value: !Sub "http://${WebServer.PublicIp}"
